version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install --legacy-peer-deps
    build:
      commands:
        - npm run build
    postBuild:
      commands:
        - |
          if [ -n "$AWS_APP_ID" ]; then
            aws amplify update-app --app-id "$AWS_APP_ID" --custom-rules file://amplify-custom-rules.json \
              || echo "Amplify redirect rules were not updated automatically. Apply amplify-custom-rules.json in the console."
          fi
  artifacts:
    baseDirectory: build
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
